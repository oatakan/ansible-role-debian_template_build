---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Check that we can connect to the instance
      ansible.builtin.ping:

    - name: Verify SSH configuration (UseDNS)
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^UseDNS'
        line: 'UseDNS no'
        state: present
      check_mode: true
      register: ssh_usedns_check

    - name: Assert SSH configuration was applied
      ansible.builtin.assert:
        that:
          - not ssh_usedns_check.changed
        fail_msg: "SSH config did not include 'UseDNS no'"

    - name: Check netplan config on Ubuntu
      ansible.builtin.stat:
        path: /etc/netplan/00-installer-config.yaml
      register: netplan_stat
      when: ansible_distribution == 'Ubuntu'

    - name: Assert netplan config exists on Ubuntu
      ansible.builtin.assert:
        that:
          - netplan_stat.stat.exists
        fail_msg: "/etc/netplan/00-installer-config.yaml not found on Ubuntu"
      when: ansible_distribution == 'Ubuntu'

    - name: Check stale Ubuntu network config files
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/netplan/50-cloud-init.yaml
        - /etc/netplan/99-netcfg-vmware.yaml
        - /etc/cloud/cloud.cfg.d/50-curtin-networking.cfg
        - /etc/cloud/cloud.cfg.d/90-installer-network.cfg
        - /etc/cloud/cloud.cfg.d/subiquity-disable-cloudinit-networking.cfg
      register: stale_network_config
      when: ansible_distribution == 'Ubuntu'

    - name: Assert stale Ubuntu network config files are absent
      ansible.builtin.assert:
        that:
          - >-
            stale_network_config.results
            | selectattr('stat.exists', 'equalto', true)
            | list
            | length == 0
        fail_msg: "Stale Ubuntu installer/cloud-init network config remains."
      when: ansible_distribution == 'Ubuntu'

    - name: Success message
      ansible.builtin.debug:
        msg: "✅ Molecule verification checks passed"
